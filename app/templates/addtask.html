{% extends "base.html" %}

{%block content %}
	<h1>Add a new task</h1>
	<form action="" method="post" novalidate>
		{{ form.hidden_tag() }}
		<p>
			{{ form.taskname.label }}<br>
			{{ form.taskname(size=128) }}<br>
			{% for error in form.taskname.errors %}
			<span style="color: red;">[{{ error }}]</span>
			{% endfor %}
		</p>
		<p>
			{{ form.submit() }}
		</p>
	</form>
{% endblock %}
